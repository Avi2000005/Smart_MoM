name: smart_mom
description: Smart MoM - Minutes of Meeting Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI utilities
  cupertino_icons: ^1.0.6

  # Date formatting
  intl: ^0.19.0

  # API calls
  http: ^1.2.0

  # Store login token locally
  shared_preferences: ^2.2.3

  # Generate PDFs (for meeting export)
  pdf: ^3.10.8
  printing: ^5.12.0
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  dio: ^5.9.2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true